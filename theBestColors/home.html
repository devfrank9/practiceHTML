<!DOCTYPE html>
<html lang="kr">
  <head>
    <title>The Best Colors</title>
    <style>
      body {
        background-color: #f5f5f5;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        margin: 20px;
      }
      h1 {
        font-size: 30px;
        margin-bottom: 50px;
      }
      .section {
        width: 500px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
      }
      .contentsBox {
        border: 4px solid white;
        width: 160px;
        height: 270px;
        margin: 8px;
      }
      body > div > div:nth-child(1) {
        background-color: tomato;
      }
      body > div > div:nth-child(2) {
        background-color: teal;
      }
      body > div > div:nth-child(3) {
        background-color: burlywood;
      }
      body > div > div:nth-child(4) {
        background-color: thistle;
      }
      .contentsBox2 {
        background-color: white;
        width: 160px;
        height: 88px;
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
      }
      .fontstyle1 {
        font-style: bold;
        font-size: 18px;
      }
      .fontstyle2 {
        font-style: bold;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>The Best Colors</h1>
    <div class="section">
      <div class="contentsBox">
        <div class="contentsBox2">
          <p class="fontstyle1">Tomato</p>
          <p class="fontstyle2">#FF6347</p>
        </div>
      </div>
      <div class="contentsBox">
        <div class="contentsBox2">
          <p class="fontstyle1">Teal</p>
          <p class="fontstyle2">#008080</p>
        </div>
      </div>
      <div class="contentsBox">
        <div class="contentsBox2">
          <p class="fontstyle1">Burlywood</p>
          <p class="fontstyle2">#DEB887</p>
        </div>
      </div>
      <div class="contentsBox">
        <div class="contentsBox2">
          <p class="fontstyle1">Thistle</p>
          <p class="fontstyle2">#D7BFD7</p>
        </div>
      </div>
    </div>
  </body>
</html>
