<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends - Kokoa Clone</title>
  </head>
  <body>
    <div class="status-bar">
      <div class="status-bar__column">
        <span>SKTF</span>
        <i class="fas fa-wifi"></i>
      </div>
      <div class="status-bar__column">
        <span>11:12</span>
      </div>
      <div class="status-bar__column">
        <span>99%</span>
        <i class="fas fa-battery-full fa-lg"></i>
      </div>
    </div>

    <header class="screen-header">
      <h1 class="screen-header__title">Friends</h1>
      <div class="screen-header__icons">
        <span><i class="fas fa-search fa-lg"></i></span>
        <span><i class="fas fa-music fa-lg"></i></span>
        <span
          ><a href="settings.html"><i class="fas fa-cog fa-lg"></i></a
        ></span>
      </div>
    </header>

    <a id="friends-display-link">
      <i class="fas fa-info-circle"></i> Friends Names Display
      <i class="fas fa-chevron-right fa-xs"></i>
    </a>

    <main class="friends-screen-main">
      <div class="friends-screen__friends-scroll">
        <div class="user-component">
          <div class="user-component__column">
            <img
              src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2F20140625_51%2Fnardinger_1403659650345HzX7T_GIF%2F105.gif&type=sc960_832_gif"
              class="user-component__avatar user-component__avatar--xl"
            />
            <div class="user-component__text">
              <h4 class="user-component__title">한지우</h4>
              <h6 class="user-component__subtitle">
                세계 최고의 포켓몬 마스터가 되겠어
              </h6>
            </div>
          </div>
          <div class="user-component__column"></div>
        </div>
        <div class="friends-screen__channel">
          <div class="friends-screen__channel-header">
            <span>Channel</span>
            <i class="fas fa-chevron-right fa-xs"></i>
          </div>
          <div class="friends-screen__channel-header">
            <span>Friends</span>
            <i class="fas fa-chevron-up fa-xs"></i>
          </div>
          <div class="user-component">
            <div class="user-component__column">
              <img
                src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2F20160109_264%2Fjo9405_1452347453263gfpNA_GIF%2Fhttps253A252F252F49_media_tumblr_com252F71cdbd508aad9972eed9311e9119795c252.gif&type=sc960_832_gif"
                class="user-component__avatar user-component__avatar--sm"
              />
              <div class="user-component__text">
                <h4
                  class="user-component__title user-component__title--not-bold"
                >
                  피카츄
                </h4>
              </div>
            </div>
            <div class="user-component__column">
              <div class="user-component__status-text">
                <span>떼궤 쮀꼬의 풔켓뭔 매스터~ ㅋㅋㅋㅋㅋㅋ</span>
              </div>
            </div>
          </div>
          <div class="user-component">
            <div class="user-component__column">
              <img
                src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2F20150930_203%2Fmoongemo_1443598844282PjlGa_GIF%2F%25C0%25CC%25BB%25F3%25C7%25D8%25BE%25BE_5.gif&type=sc960_832_gif"
                class="user-component__avatar user-component__avatar--sm"
              />
              <div class="user-component__text">
                <h4
                  class="user-component__title user-component__title--not-bold"
                >
                  이상해씨
                </h4>
              </div>
            </div>
            <div class="user-component__column">
              <div class="user-component__status-text">
                <span>야 우냐? ㅋㅋㅋ</span>
              </div>
            </div>
          </div>
          <div class="user-component">
            <div class="user-component__column">
              <img
                src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2F20150511_143%2Feunju_0112_1431324861254fGIwd_GIF%2F1.gif&type=sc960_832_gif"
                class="user-component__avatar user-component__avatar--sm"
              />
              <div class="user-component__text">
                <h4
                  class="user-component__title user-component__title--not-bold"
                >
                  파이리
                </h4>
              </div>
            </div>
            <div class="user-component__column">
              <div class="user-component__status-text">
                <span>넥 슬라이스! ㅋㅋㅋ</span>
              </div>
            </div>
          </div>
          <div class="user-component">
            <div class="user-component__column">
              <img
                src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAxOTExMDVfMjUw%2FMDAxNTcyOTQzMTg1Mjc5.KJYWU_mIv4lwE999RwJWSnPQJgGKISdxg4rdowTMu0sg.mdqZPMdJhMAR3pLrZV9KLDj01tzSnteQuSpBeHaaa_Mg.JPEG.wlqeks541%2FIMG_8434.JPG&type=sc960_832"
                class="user-component__avatar user-component__avatar--sm"
              />
              <div class="user-component__text">
                <h4
                  class="user-component__title user-component__title--not-bold"
                >
                  피존투
                </h4>
              </div>
            </div>
            <div class="user-component__column">
              <div class="user-component__status-text">
                <span>언젠간 오겠지...</span>
              </div>
            </div>
          </div>
          <div class="user-component">
            <div class="user-component__column">
              <img
                src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAxODExMTVfMTUw%2FMDAxNTQyMjI2Njk4NjQx.iZdthnn9rmzJJaJR_njgZZuGx58f_asOgJCHK-IKRc8g.n8vLCpenZm33bG1-gOCM1-9lnlxQixwFMpgsKPMU4ocg.PNG.haleejjang1%2F%25B3%25AA%25BF%25CB_%25B0%25F8%25BD%25C4_%25C0%25CF%25B7%25AF%25BD%25BA%25C6%25AE.png&type=sc960_832"
                class="user-component__avatar user-component__avatar--sm"
              />
              <div class="user-component__text">
                <h4
                  class="user-component__title user-component__title--not-bold"
                >
                  나옹
                </h4>
              </div>
            </div>
            <div class="user-component__column">
              <div class="user-component__status-text">
                <span>나옹이다옹</span>
              </div>
            </div>
          </div>
          <div class="user-component">
            <div class="user-component__column">
              <img
                src="https://search.pstatic.net/common/?src=http%3A%2F%2Fcafefiles.naver.net%2FMjAxOTAyMDJfMTE3%2FMDAxNTQ5MDU3ODIwNTIw.mrKSq7z3rqYxaT7rRudzsLIhR1k-5CEPHSXvQ6NBpV4g.kdM487pEJ7y3fF4b2fK2zfr6nx07qZiakYxbNIc8ya0g.GIF.kukjin790719%2FexternalFile.gif&type=sc960_832_gif"
                class="user-component__avatar user-component__avatar--sm"
              />
              <div class="user-component__text">
                <h4
                  class="user-component__title user-component__title--not-bold"
                >
                  꼬부기
                </h4>
              </div>
            </div>
            <div class="user-component__column">
              <div class="user-component__status-text">
                <span>힘들다...</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__btn">
          <a class="nav__link" href="friends.html"
            ><i class="fas fa-user fa-2x"></i
          ></a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="chats.html">
            <span class="nav_notification">99+</span>
            <i class="far fa-comment fa-2x"></i
          ></a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="find.html"
            ><i class="fas fa-search fa-2x"></i
          ></a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="info.html"
            ><span class="nav_reddot"></span>
            <i class="fas fa-ellipsis-h fa-2x"></i
          ></a>
        </li>
      </ul>
    </nav>

    <div id="splash-screen">
      <i class="fas fa-comment"></i>
    </div>

    <div id="no-mobile">
      <span>Your screen is too big ㅠㅠ</span>
    </div>

    <script
      src="https://kit.fontawesome.com/6478f529f2.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
