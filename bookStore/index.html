<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=chrome" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="menu-bar">
      <div class="menu-bar__column">
        <svg
          width="30px"
          height="30px"
          class="w-6 h-6"
          data-darkreader-inline-stroke=""
          fill="none"
          stroke="currentColor"
          style="--darkreader-inline-stroke: currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h8m-8 6h16"
          ></path>
        </svg>
      </div>
      <div class="menu-bar__column">
        <span>library</span>
      </div>
      <div class="menu-bar__column">
        <svg
          width="30px"
          height="30px"
          class="w-6 h-6"
          data-darkreader-inline-stroke=""
          fill="none"
          stroke="currentColor"
          style="--darkreader-inline-stroke: currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
          ></path>
        </svg>
      </div>
    </div>
    <form class="search-form">
      <input name="search-books" type="text" placeholder="Search books..." />
    </form>
    <header class="library-header">Book of the day</header>
    <div class="img-box">
      <img
        class="img1"
        src="https://m.media-amazon.com/images/I/512eZ2k0z0L.jpg"
      />
      <div class="span-day">
        <h1>No Fixed Abode</h1>
        <h2>Journey Through</h2>
        <div class="unable_star-rating">
          <span>☆</span><span>☆</span><span>☆</span><span>☆</span><span>☆</span>
        </div>

        <div class="btn"></div>
      </div>
    </div>
    <script
      src="https://kit.fontawesome.com/6478f529f2.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
